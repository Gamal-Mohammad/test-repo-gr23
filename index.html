<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 Matches & Results</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
    }

    header {
        background: #003366;
        color: white;
        text-align: center;
        padding: 20px;
        border-radius: 10px;
    }

    .matches {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .content {
        padding: 15px;
    }

    .teams {
        font-size: 22px;
        font-weight: bold;
        text-align: center;
        margin: 10px 0;
    }

    .score {
        text-align: center;
        font-size: 28px;
        color: #007bff;
        font-weight: bold;
    }

    .date {
        text-align: center;
        color: #666;
        margin-top: 10px;
    }
</style>
</head>
<body>

<header>
    <h1>FIFA World Cup 2026</h1>
    <p>Matches & Results</p>
</header>

<div class="matches">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=800" alt="Football Stadium">
        <div class="content">
            <div class="teams">Mexico vs South Africa</div>
            <div class="score">2 - 0</div>
            <div class="date">11 June 2026</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800" alt="Football Match">
        <div class="content">
            <div class="teams">USA vs Paraguay</div>
            <div class="score">4 - 1</div>
            <div class="date">12 June 2026</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=800" alt="Soccer Fans">
        <div class="content">
            <div class="teams">Brazil vs Haiti</div>
            <div class="score">3 - 0</div>
            <div class="date">19 June 2026</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=800" alt="Football Stadium">
        <div class="content">
            <div class="teams">Argentina vs Algeria</div>
            <div class="score">3 - 0</div>
            <div class="date">16 June 2026</div>
        </div>
    </div>

</div>

</body>
</html>
